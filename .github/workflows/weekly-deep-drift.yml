name: Weekly Deep Docs-Drift Check (per skill)

# Runs the EXPENSIVE per-page hash verification weekly. Daily uses fast
# mode (index-only); this catches content drift that doesn't change the
# index. Matrix-iterates over every skill.

on:
  schedule:
    - cron: "0 12 * * 1"   # Every Monday 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover-skills:
    if: github.repository == 'xiaolai/anthropic-docs'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - id: list
        run: |
          SKILLS=$(find skills -mindepth 1 -maxdepth 1 -type d \
                    -exec test -f '{}'/config.json \; -print \
                    | sed 's|^skills/||' | sort -u)
          MATRIX=$(printf '%s\n' "$SKILLS" | jq -R . | jq -s -c '{skill: .}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  deep-drift:
    needs: discover-skills
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix: ${{ fromJson(needs.discover-skills.outputs.matrix) }}
    env:
      SKILL_NAME: ${{ matrix.skill }}
    steps:
      - uses: actions/checkout@v4

      - name: Run deep drift check (${{ matrix.skill }})
        run: bash pipeline/scripts/check-docs-drift.sh --deep

      - name: Note on failure
        if: failure()
        run: |
          echo "::warning::Weekly deep drift detected for $SKILL_NAME. Run 'SKILL_NAME=$SKILL_NAME bash pipeline/scripts/refresh-docs-snapshot.sh' locally and open a PR."
