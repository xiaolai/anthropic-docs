name: CC Knowledge Update Check

on:
  schedule:
    - cron: "0 8 * * *"  # Daily at 08:00 UTC
  workflow_dispatch:

# Workflow-level permissions are minimum (read-only). The single job below
# escalates to contents:write + pull-requests:write only for its own scope.
# A future improvement is to split into a "fetch/analyse" job (read-only)
# and a "commit/PR" job (write); the agent steps would run in the read-only
# job and produce a patch artifact the commit job applies. Out of scope here.
permissions:
  contents: read

env:
  MAX_MEND_RETRIES: 2
  PIPELINE_LOG: /tmp/pipeline-log.json
  # Per-file diff threshold for the safety gate. Above this %, the run is
  # routed to a draft PR instead of pushed to main.
  DIFF_THRESHOLD_PCT: 20
  # Pin the Claude Code CLI version installed globally for this run. The
  # agent SDK in agent/package.json is pinned via agent/package-lock.json;
  # this env var pins the CLI that the SDK shells out to. Bump when you
  # have a tested target version; do not auto-track latest.
  CLAUDE_CODE_CLI_VERSION: "2.1.143"

jobs:
  daily-run:
    if: github.repository == 'xiaolai/claude-code-documentation-knowledge-autoupdated'
    runs-on: ubuntu-latest
    permissions:
      contents: write       # commit and push pipeline output (commit step only)
      pull-requests: write  # open draft PR if a safety gate trips
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need HEAD~1 for diff-size baseline
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Initialize pipeline log
        run: |
          echo '{"startedAt":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'","steps":[]}' > "$PIPELINE_LOG"

      # ---------------------------------------------------------------
      # 1. Monitor — zero API cost
      # ---------------------------------------------------------------
      - name: Run change monitor
        id: monitor
        working-directory: agent
        run: |
          START=$(date +%s)
          bash monitor.sh && echo "changes=false" >> "$GITHUB_OUTPUT" || {
            exit_code=$?
            if [ "$exit_code" -eq 1 ]; then
              echo "changes=true" >> "$GITHUB_OUTPUT"
            else
              ELAPSED=$(( $(date +%s) - START ))
              jq --arg s "monitor" --arg r "error" --arg d "${ELAPSED}s" \
                --arg e "Monitor script failed with exit code $exit_code" \
                '.steps += [{"step":$s,"result":$r,"duration":$d,"error":$e}]' \
                "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
              exit $exit_code
            fi
          }
          ELAPSED=$(( $(date +%s) - START ))
          if [ -f /tmp/change-report.json ] && [ "$(jq '.changes | length' /tmp/change-report.json)" -gt 0 ]; then
            CHANGES="true"
          else
            CHANGES="false"
          fi
          jq --arg s "monitor" --arg r "success" --arg d "${ELAPSED}s" \
            --arg c "$CHANGES" \
            '.steps += [{"step":$s,"result":$r,"duration":$d,"changesDetected":($c == "true")}]' \
            "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"

      # ---------------------------------------------------------------
      # 2. Setup — install Claude Code, agent deps, root verification deps
      # ---------------------------------------------------------------
      - name: Install Claude Code (pinned)
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_CLI_VERSION}"

      - name: Detect auth method (without leaking the token)
        id: auth
        env:
          # Side-channel: only the boolean "do we have a token" is exported,
          # not the token itself. Each agent step injects the real token via
          # its own step-level env: block — no $GITHUB_ENV write.
          HAS_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
          HAS_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          # METHOD is captured into a shell var so the same value lands in
          # both the step output AND the pipeline-log jq call below. The
          # previous version read `${{ steps.auth.outputs.method }}` from
          # inside its own step, which evaluates BEFORE the step writes its
          # output and so always recorded "unknown" in the log.
          METHOD="unknown"
          if [ "$HAS_OAUTH" = "true" ]; then
            echo "Using OAuth token authentication"
            mkdir -p ~/.claude
            echo '{"hasCompletedOnboarding":true}' > ~/.claude.json
            METHOD="oauth"
          elif [ "$HAS_API_KEY" = "true" ]; then
            echo "Using API key authentication"
            METHOD="api_key"
          else
            echo "ERROR: No authentication configured."
            echo "Set either CLAUDE_CODE_OAUTH_TOKEN or ANTHROPIC_API_KEY secret."
            jq --arg s "auth" --arg r "error" --arg e "No authentication configured" \
              '.steps += [{"step":$s,"result":$r,"error":$e}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            exit 1
          fi
          echo "method=$METHOD" >> "$GITHUB_OUTPUT"
          jq --arg s "auth" --arg r "success" --arg m "$METHOD" \
            '.steps += [{"step":$s,"result":$r,"method":$m}]' \
            "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"

      - name: Install agent dependencies (npm ci — lockfile enforced)
        working-directory: agent
        run: npm ci

      - name: Install root verification dependencies (npm ci — lockfile enforced)
        run: npm ci

      # ---------------------------------------------------------------
      # 3. Update agent — only when version changes detected
      # ---------------------------------------------------------------
      - name: Run update agent
        id: update
        if: steps.monitor.outputs.changes == 'true'
        continue-on-error: true
        working-directory: agent
        env:
          # Scope the auth token to ONLY this step. Avoids leaking it via
          # $GITHUB_ENV to every subsequent step (incl. verify scripts that
          # don't need it).
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          START=$(date +%s)
          npx tsx update-agent.ts 2>&1 | tee /tmp/update-agent.log
          EXIT_CODE=${PIPESTATUS[0]}
          ELAPSED=$(( $(date +%s) - START ))

          if [ "$EXIT_CODE" -eq 0 ]; then
            jq --arg s "update" --arg r "success" --arg d "${ELAPSED}s" \
              '.steps += [{"step":$s,"result":$r,"duration":$d}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
          else
            LAST_LINES=$(tail -20 /tmp/update-agent.log | jq -Rs '.')
            jq --arg s "update" --arg r "failed" --arg d "${ELAPSED}s" \
              --arg c "$EXIT_CODE" --argjson e "$LAST_LINES" \
              '.steps += [{"step":$s,"result":$r,"duration":$d,"exitCode":($c|tonumber),"lastOutput":$e}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            exit $EXIT_CODE
          fi

      # ---------------------------------------------------------------
      # 4. Research agent — runs daily
      # ---------------------------------------------------------------
      - name: Run research agent
        id: research
        continue-on-error: true
        working-directory: agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          START=$(date +%s)
          npx tsx research-agent.ts 2>&1 | tee /tmp/research.log
          EXIT_CODE=${PIPESTATUS[0]}
          ELAPSED=$(( $(date +%s) - START ))

          if [ "$EXIT_CODE" -eq 0 ]; then
            jq --arg s "research" --arg r "success" --arg d "${ELAPSED}s" \
              '.steps += [{"step":$s,"result":$r,"duration":$d}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
          else
            LAST_LINES=$(tail -20 /tmp/research.log | jq -Rs '.')
            jq --arg s "research" --arg r "failed" --arg d "${ELAPSED}s" \
              --arg c "$EXIT_CODE" --argjson e "$LAST_LINES" \
              '.steps += [{"step":$s,"result":$r,"duration":$d,"exitCode":($c|tonumber),"lastOutput":$e}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            exit $EXIT_CODE
          fi

      # ---------------------------------------------------------------
      # 5. Verify → Mend loop (only when version changed)
      # ---------------------------------------------------------------
      - name: Verify and mend loop
        id: verify
        if: steps.monitor.outputs.changes == 'true'
        continue-on-error: true
        working-directory: agent
        env:
          # Only the mending-agent inner step needs the token; verify.sh
          # itself is a deterministic bash check with no LLM call. Scoped
          # here because they share the same workflow step.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          START=$(date +%s)
          MEND_ATTEMPTS=0

          for attempt in $(seq 0 $MAX_MEND_RETRIES); do
            echo ""
            echo "=== Verification attempt $((attempt + 1)) of $((MAX_MEND_RETRIES + 1)) ==="
            echo ""

            if bash verify.sh; then
              ELAPSED=$(( $(date +%s) - START ))
              jq --arg s "verify" --arg r "success" --arg d "${ELAPSED}s" \
                --arg a "$((attempt + 1))" --arg m "$MEND_ATTEMPTS" \
                '.steps += [{"step":$s,"result":$r,"duration":$d,"verifyAttempt":($a|tonumber),"mendRuns":($m|tonumber)}]' \
                "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
              exit 0
            fi

            if [ "$attempt" -eq "$MAX_MEND_RETRIES" ]; then
              ELAPSED=$(( $(date +%s) - START ))
              FAILURES=""
              if [ -f /tmp/verify-report.json ]; then
                FAILURES=$(jq -c '.failures' /tmp/verify-report.json)
              fi
              jq --arg s "verify" --arg r "failed" --arg d "${ELAPSED}s" \
                --arg a "$((attempt + 1))" --arg m "$MEND_ATTEMPTS" \
                --argjson f "${FAILURES:-[]}" \
                '.steps += [{"step":$s,"result":$r,"duration":$d,"verifyAttempt":($a|tonumber),"mendRuns":($m|tonumber),"failures":$f}]' \
                "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
              exit 1
            fi

            echo ""
            echo "--- Running mending agent (attempt $((attempt + 1))) ---"
            echo ""
            MEND_ATTEMPTS=$((MEND_ATTEMPTS + 1))
            # Capture the mending agent's exit code via PIPESTATUS so a
            # crash is visible — `| tee` would otherwise mask the failure
            # behind a successful tee. If mending crashes hard, surface
            # the exit code in the pipeline log; verify will fail again
            # next iteration but at least we know mending didn't help.
            npx tsx mending-agent.ts 2>&1 | tee /tmp/mending-agent-$((attempt + 1)).log
            MEND_EXIT=${PIPESTATUS[0]}
            if [ "$MEND_EXIT" -ne 0 ]; then
              echo "WARN: mending agent exited $MEND_EXIT on attempt $((attempt + 1))"
              jq --arg s "mending" --arg a "$((attempt + 1))" --arg c "$MEND_EXIT" \
                '.steps += [{"step":$s,"attempt":($a|tonumber),"result":"failed","exitCode":($c|tonumber)}]' \
                "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            fi
          done

      # ---------------------------------------------------------------
      # 6. Content safety gates (always run after research, even if
      #    verify was skipped because no version changed)
      # ---------------------------------------------------------------
      - name: Typecheck templates
        id: typecheck_templates
        if: always()
        continue-on-error: true
        run: bash scripts/typecheck-templates.sh

      - name: Validate schema-bound examples
        id: validate_examples
        if: always()
        continue-on-error: true
        run: bash scripts/validate-examples.sh

      - name: Check populated sections
        id: check_populated
        if: always()
        continue-on-error: true
        run: bash scripts/check-populated.sh

      - name: Check docs-snapshot drift vs upstream llms.txt
        id: check_docs_drift
        if: always()
        continue-on-error: true
        run: bash scripts/check-docs-drift.sh

      # ---------------------------------------------------------------
      # 7. Update state.json — MERGE fresh-state into the live state
      #
      # /tmp/fresh-state.json was built by monitor.sh BEFORE research ran.
      # The research agent may have written to state.json since (new
      # researchedIssues entries, lastRunWarnings, etc.). A wholesale `cp`
      # would erase those writes. Instead we merge: monitor-owned fields
      # from fresh-state overwrite state.json's snapshot of them, while
      # research-agent-owned fields are preserved from the live state.
      # ---------------------------------------------------------------
      - name: Update state.json (merge fresh monitor fields into live state)
        if: always()
        working-directory: agent
        run: |
          if [ ! -f /tmp/fresh-state.json ]; then
            echo "No /tmp/fresh-state.json — keeping current state.json unchanged."
            exit 0
          fi
          # state.json may not exist on a brand-new run; treat as empty object.
          if [ ! -f state.json ]; then
            echo '{}' > state.json
          fi
          # First arg = live state (with research writes); second = fresh state.
          # `*` is jq's deep-merge: keys from fresh overwrite the LHS where set.
          # Then explicitly preserve research-agent-owned fields from the LHS.
          jq -s '
            .[0] as $live | .[1] as $fresh
            | ($live * {
                registry: $fresh.registry,
                github: $fresh.github,
                docs: $fresh.docs,
                trackedIssues: $fresh.trackedIssues,
                lastScannedIssueNumber: $fresh.lastScannedIssueNumber,
                lastAuditedVersion: $fresh.lastAuditedVersion,
                lastUpdated: $fresh.lastUpdated
              })
            | .researchedIssues = ($live.researchedIssues // {})
            | .lastRunWarnings  = ($live.lastRunWarnings // [])
            | .scaffoldComplete = ($live.scaffoldComplete // false)
          ' state.json /tmp/fresh-state.json > /tmp/merged-state.json \
            && mv /tmp/merged-state.json state.json
          echo "state.json merged — researchedIssues=$(jq '.researchedIssues | length' state.json), lastRunWarnings=$(jq '.lastRunWarnings | length' state.json), scaffoldComplete=$(jq -r '.scaffoldComplete' state.json)"

      # ---------------------------------------------------------------
      # 7b. Flip scaffoldComplete on first successful population
      #
      # Scaffold mode (state.scaffoldComplete == false) tells
      # scripts/check-populated.sh to skip its stub-marker check.
      # Once the research agent has populated every SKILL-*.md /
      # rules/*.md section (zero residual `*Populated by the research
      # agent*` markers), flip to true so the gate starts enforcing.
      # ---------------------------------------------------------------
      - name: Flip scaffoldComplete on first successful population
        if: always() && steps.research.outcome == 'success'
        working-directory: agent
        run: |
          # Count residual stub markers in tracked SKILL / rules files.
          STUB_COUNT=$(grep -lE '\*Populated by the research agent\*' \
            ../SKILL-*.md ../rules/*.md 2>/dev/null | wc -l | tr -d ' ')
          CURRENT=$(jq -r '.scaffoldComplete // false' state.json)
          echo "Residual stub files: $STUB_COUNT   scaffoldComplete: $CURRENT"
          if [ "$STUB_COUNT" = "0" ] && [ "$CURRENT" = "false" ]; then
            echo "First successful population detected — flipping scaffoldComplete to true."
            jq '.scaffoldComplete = true' state.json > /tmp/sc.tmp && mv /tmp/sc.tmp state.json
          fi

      # ---------------------------------------------------------------
      # 7c. Diff-size gate (run BEFORE finalize log so the report agent
      #     sees its outcome in /tmp/pipeline-log.json).
      # ---------------------------------------------------------------
      - name: Check diff size against HEAD
        id: check_diff_size
        if: always()
        continue-on-error: true
        env:
          DIFF_THRESHOLD_PCT: ${{ env.DIFF_THRESHOLD_PCT }}
        run: bash scripts/check-diff-size.sh

      - name: Finalize pipeline log
        if: always()
        run: |
          jq \
            --arg update_outcome "${{ steps.update.outcome || 'skipped' }}" \
            --arg research_outcome "${{ steps.research.outcome || 'skipped' }}" \
            --arg verify_outcome "${{ steps.verify.outcome || 'skipped' }}" \
            --arg typecheck_outcome "${{ steps.typecheck_templates.outcome || 'skipped' }}" \
            --arg validate_outcome "${{ steps.validate_examples.outcome || 'skipped' }}" \
            --arg populated_outcome "${{ steps.check_populated.outcome || 'skipped' }}" \
            --arg docsdrift_outcome "${{ steps.check_docs_drift.outcome || 'skipped' }}" \
            --arg diffsize_outcome "${{ steps.check_diff_size.outcome || 'skipped' }}" \
            --arg finished "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '. + {
              "finishedAt": $finished,
              "outcomes": {
                "update": $update_outcome,
                "research": $research_outcome,
                "verify": $verify_outcome,
                "typecheckTemplates": $typecheck_outcome,
                "validateExamples": $validate_outcome,
                "checkPopulated": $populated_outcome,
                "checkDocsDrift": $docsdrift_outcome,
                "checkDiffSize": $diffsize_outcome
              }
            }' "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"

          cat "$PIPELINE_LOG" | jq .

      - name: Run report agent
        id: report
        if: always()
        continue-on-error: true
        working-directory: agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          START=$(date +%s)
          npx tsx report-agent.ts 2>&1 | tee /tmp/report-agent.log
          EXIT_CODE=${PIPESTATUS[0]}
          ELAPSED=$(( $(date +%s) - START ))

          if [ "$EXIT_CODE" -eq 0 ]; then
            jq --arg s "report" --arg r "success" --arg d "${ELAPSED}s" \
              '.steps += [{"step":$s,"result":$r,"duration":$d}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
          else
            # Capture report-agent failure so it surfaces in the final
            # outcomes block + the "Check for failures" step below. Without
            # this the workflow committed silently on a bad report-agent run.
            LAST_LINES=$(tail -20 /tmp/report-agent.log | jq -Rs '.')
            jq --arg s "report" --arg r "failed" --arg d "${ELAPSED}s" \
              --arg c "$EXIT_CODE" --argjson e "$LAST_LINES" \
              '.steps += [{"step":$s,"result":$r,"duration":$d,"exitCode":($c|tonumber),"lastOutput":$e}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            # CRITICAL: exit with the agent's exit code so GH Actions records
            # this step as "failure". Without this exit, the step's last
            # command is the jq pipeline above which exits 0, GH Actions
            # records "success" despite continue-on-error, and
            # `steps.report.outcome` reads "success" downstream — defeating
            # the entire failure-detection path. continue-on-error: true
            # at the step level prevents this nonzero exit from killing the
            # job; it only flips the recorded outcome.
            exit "$EXIT_CODE"
          fi

      - name: Update README auto-updated date
        if: always()
        run: |
          NOW=$(date -u +%Y-%m-%d)
          sed -i "s/\*\*Last updated\*\*: [0-9-]*/\*\*Last updated\*\*: $NOW/" README.md || true

      # ---------------------------------------------------------------
      # 8. Commit + push (or open draft PR if any gate failed)
      # ---------------------------------------------------------------
      - name: Commit and push (or open draft PR)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A .
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          # Collect gate outcomes
          VALIDATE="${{ steps.validate_examples.outcome || 'skipped' }}"
          TYPECHECK="${{ steps.typecheck_templates.outcome || 'skipped' }}"
          POPULATED="${{ steps.check_populated.outcome || 'skipped' }}"
          DOCSDRIFT="${{ steps.check_docs_drift.outcome || 'skipped' }}"
          DIFFSIZE="${{ steps.check_diff_size.outcome || 'skipped' }}"
          VERIFY="${{ steps.verify.outcome || 'skipped' }}"
          # report-agent isn't a "gate" in the strict sense, but a crashed
          # report means the daily report file + README activity table won't
          # be updated — pushing that state silently to main is wrong. Route
          # to draft PR for human review instead.
          REPORT="${{ steps.report.outcome || 'skipped' }}"

          GATES_FAILED=""
          for pair in "validate_examples:$VALIDATE" "typecheck_templates:$TYPECHECK" "check_populated:$POPULATED" "check_docs_drift:$DOCSDRIFT" "check_diff_size:$DIFFSIZE" "verify:$VERIFY" "report:$REPORT"; do
            name="${pair%%:*}"
            outcome="${pair##*:}"
            if [ "$outcome" = "failure" ]; then
              GATES_FAILED="$GATES_FAILED $name"
            fi
          done

          TODAY=$(date -u +%Y-%m-%d)
          REPORT="/tmp/change-report.json"

          # Build commit message
          {
            if [ -n "$GATES_FAILED" ]; then
              echo "auto: pending review (${TODAY}) — gates failed:${GATES_FAILED}"
              echo ""
              echo "One or more safety gates flagged this run. Review the diff"
              echo "before merging. Failed gates:${GATES_FAILED}"
            elif [ -f "$REPORT" ] && jq -e '.changes[] | select(.type == "npm_version")' "$REPORT" > /dev/null 2>&1; then
              OLD_VER=$(jq -r '.oldVersion' "$REPORT")
              NEW_VER=$(jq -r '.newVersion // "update"' "$REPORT")
              echo "update: CC v${OLD_VER} → v${NEW_VER} (${TODAY})"
            else
              echo "daily: research + report (${TODAY})"
            fi
          } > /tmp/commit-message.txt

          if [ -n "$GATES_FAILED" ]; then
            # Include run_id + attempt so a second failed run on the same
            # day doesn't collide with the first run's branch (which would
            # break the `git checkout -b` or the `git push -u` step).
            BRANCH="auto/${TODAY}-pending-review-${{ github.run_id }}-${{ github.run_attempt }}"
            echo "Routing to draft PR on branch: $BRANCH"
            git checkout -b "$BRANCH"
            git commit -F /tmp/commit-message.txt
            git push -u origin "$BRANCH"

            PR_BODY=$(printf '%s\n' \
              "Auto-generated by the daily pipeline. **One or more safety gates flagged this run.**" \
              "" \
              "Failed gates:${GATES_FAILED}" \
              "" \
              "Review the diff carefully before merging. Common reasons for routing here:" \
              "" \
              "- **validate_examples**: a fenced JSON block in a SKILL-*.md no longer validates against its schema." \
              "- **typecheck_templates**: a template under \`templates/\` has invalid syntax." \
              "- **check_populated**: in post-scaffold mode, a stub marker still exists in a tracked file." \
              "- **check_docs_drift**: upstream llms.txt index hash has changed since the last \`docs-snapshot/\` refresh. Run \`bash scripts/refresh-docs-snapshot.sh\` locally, review the diff, and commit." \
              "- **check_diff_size**: a tracked file changed >${DIFF_THRESHOLD_PCT}% — possible runaway-LLM rewrite." \
              "- **verify**: version-string propagation or required-file presence failed." \
              "- **report**: the report-agent crashed. The daily report and README activity table for this date are missing/stale." \
              "" \
              "If the changes look correct, mark this PR ready and merge. If not, close it and let the next pipeline run try again.")
            gh pr create --draft \
              --title "auto: pending review (${TODAY}) — $(echo "$GATES_FAILED" | xargs)" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH" || true
          else
            git commit -F /tmp/commit-message.txt
            git push
          fi

      - name: Check for failures
        if: always()
        run: |
          UPDATE="${{ steps.update.outcome || 'skipped' }}"
          RESEARCH="${{ steps.research.outcome || 'skipped' }}"
          REPORT="${{ steps.report.outcome || 'skipped' }}"
          VERIFY="${{ steps.verify.outcome || 'skipped' }}"
          VALIDATE="${{ steps.validate_examples.outcome || 'skipped' }}"
          TYPECHECK="${{ steps.typecheck_templates.outcome || 'skipped' }}"
          POPULATED="${{ steps.check_populated.outcome || 'skipped' }}"
          DOCSDRIFT="${{ steps.check_docs_drift.outcome || 'skipped' }}"
          DIFFSIZE="${{ steps.check_diff_size.outcome || 'skipped' }}"

          echo "Outcomes:"
          echo "  update=$UPDATE  research=$RESEARCH  report=$REPORT  verify=$VERIFY"
          echo "  validate=$VALIDATE  typecheck=$TYPECHECK  populated=$POPULATED"
          echo "  docsdrift=$DOCSDRIFT  diffsize=$DIFFSIZE"

          # Hard failure on any LLM-agent crash (update / research / report).
          # Gate failures route to draft PR (handled in the commit step) and
          # do NOT fail the job — they're a review request, not an error.
          if [ "$UPDATE" = "failure" ] || [ "$RESEARCH" = "failure" ] || [ "$REPORT" = "failure" ]; then
            echo "Pipeline had agent crashes — failing the job."
            exit 1
          fi
