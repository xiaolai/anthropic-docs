name: Multi-skill update (hourly)

# Multi-skill fan-out over every skill in skills/*. Each matrix entry runs
# the full pipeline for one skill: monitor → optional snapshot-refresh +
# update → research → verify+mend → safety gates → commit (or draft PR
# on gate failure).
#
# fail-fast: false so one bad skill doesn't kill the others.
# max-parallel: 1 to serialize against the Claude Code subscription quota.
#
# docs-snapshot/ note: per-skill page trees are gitignored. The pipeline
# re-fetches them ephemerally via refresh-docs-snapshot.sh ONLY when
# monitor.sh detects an upstream change. No-change runs skip the refresh
# entirely — most runs cost ~30s and zero LLM tokens.

on:
  schedule:
    - cron: "0 * * * *"  # Hourly at :00. GH free-tier coalesces under load.
  workflow_dispatch:
    inputs:
      skill_filter:
        description: "Optional regex to limit which skills run (e.g. 'claude-code')"
        required: false
        default: ""
      force_refresh:
        description: "Force refresh-docs-snapshot.sh even if monitor sees no changes"
        required: false
        default: "false"

permissions:
  contents: read

env:
  MAX_MEND_RETRIES: 2
  PIPELINE_LOG: /tmp/pipeline-log.json
  # Raised again 50 → 100 because legitimate research-agent additions
  # (e.g., +106 lines on a 207-line surface = 51%) kept tripping the
  # 50% gate on healthy growth, not runaway rewrites. 100% allows a
  # surface to double in one run, which is a reasonable cap for new-
  # section additions; runaway LLM rewrites still typically delete-and-
  # re-add far more than 100% combined.
  DIFF_THRESHOLD_PCT: 100
  CLAUDE_CODE_CLI_VERSION: "2.1.143"

jobs:
  # ---------------------------------------------------------------------
  # Discover which skills exist on the current commit. Emits a matrix
  # JSON the per-skill job consumes. Cheap (one `ls` + jq) — costs
  # nothing on the LLM quota.
  # ---------------------------------------------------------------------
  discover-skills:
    if: github.repository == 'xiaolai/anthropic-docs'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - id: list
        run: |
          FILTER='${{ inputs.skill_filter }}'
          # Each subdir under skills/ with a config.json is a skill payload.
          SKILLS=$(find skills -mindepth 1 -maxdepth 1 -type d \
                    -exec test -f '{}'/config.json \; -print \
                    | sed 's|^skills/||' | sort -u)
          if [[ -n "$FILTER" ]]; then
            SKILLS=$(printf '%s\n' "$SKILLS" | grep -E "$FILTER" || true)
          fi
          MATRIX=$(printf '%s\n' "$SKILLS" | jq -R . | jq -s -c '{skill: .}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Discovered skills:"
          printf '  %s\n' $SKILLS

  # ---------------------------------------------------------------------
  # Per-skill pipeline. The body mirrors the old single-skill workflow
  # but reads $SKILL_NAME everywhere and writes per-skill commits / PRs.
  # ---------------------------------------------------------------------
  daily-run:
    needs: discover-skills
    if: needs.discover-skills.outputs.matrix != '' && needs.discover-skills.outputs.matrix != '{"skill":[""]}'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.discover-skills.outputs.matrix) }}
    env:
      SKILL_NAME: ${{ matrix.skill }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          # Defense in depth: agent steps run in the same worktree with
          # Bash; explicit commit-time creds prevent prompt-injection
          # exploitation of persisted GH token.
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Initialize pipeline log
        run: |
          jq -n --arg skill "$SKILL_NAME" --arg started "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{skill: $skill, startedAt: $started, steps: []}' > "$PIPELINE_LOG"

      # ---------------------------------------------------------------
      # 1. Monitor — zero LLM cost
      # ---------------------------------------------------------------
      - name: Run change monitor (${{ matrix.skill }})
        id: monitor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          START=$(date +%s)
          bash pipeline/agent/monitor.sh && echo "changes=false" >> "$GITHUB_OUTPUT" || {
            exit_code=$?
            if [ "$exit_code" -eq 1 ]; then
              echo "changes=true" >> "$GITHUB_OUTPUT"
            else
              ELAPSED=$(( $(date +%s) - START ))
              jq --arg s "monitor" --arg r "error" --arg d "${ELAPSED}s" \
                --arg e "Monitor exited $exit_code" \
                '.steps += [{"step":$s,"result":$r,"duration":$d,"error":$e}]' \
                "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
              exit $exit_code
            fi
          }
          ELAPSED=$(( $(date +%s) - START ))
          if [ -f /tmp/change-report.json ] && [ "$(jq '.changes | length' /tmp/change-report.json)" -gt 0 ]; then
            CHANGES="true"
          else
            CHANGES="false"
          fi
          jq --arg s "monitor" --arg r "success" --arg d "${ELAPSED}s" --arg c "$CHANGES" \
            '.steps += [{"step":$s,"result":$r,"duration":$d,"changesDetected":($c == "true")}]' \
            "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"

      # ---------------------------------------------------------------
      # 1b. Refresh docs-snapshot — ephemeral, only when needed
      # ---------------------------------------------------------------
      # Page trees are gitignored; only MANIFEST.json is committed.
      # The agents and validate-examples PASS 2 need the pages on disk,
      # so re-fetch them here BEFORE the agent steps. Skip the refresh
      # when monitor sees no changes — saves ~30s per skill per run on
      # quiet hours (most of the day).
      #
      # Per-skill override: a skill's config.json may declare
      # `pipelineOverrides.customRefreshScript` to use a bespoke
      # fetcher (e.g., anthropic-pulse scrapes HTML, not llms.txt).
      # We dispatch to the named script when present, else the
      # standard refresh-docs-snapshot.sh.
      - name: Refresh docs-snapshot (ephemeral, this run only)
        id: refresh
        if: steps.monitor.outputs.changes == 'true' || inputs.force_refresh == 'true'
        run: |
          START=$(date +%s)
          SKILL_CONFIG="skills/$SKILL_NAME/config.json"
          CUSTOM=$(jq -r '.pipelineOverrides.customRefreshScript // empty' "$SKILL_CONFIG" 2>/dev/null)
          if [[ -n "$CUSTOM" ]]; then
            echo "Using custom refresh script for $SKILL_NAME: $CUSTOM"
            bash "$CUSTOM"
          else
            bash pipeline/scripts/refresh-docs-snapshot.sh
          fi
          ELAPSED=$(( $(date +%s) - START ))
          jq --arg s "refresh" --arg r "success" --arg d "${ELAPSED}s" \
            '.steps += [{"step":$s,"result":$r,"duration":$d}]' \
            "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"

      # ---------------------------------------------------------------
      # 2. Setup
      # ---------------------------------------------------------------
      - name: Install Claude Code (pinned)
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_CODE_CLI_VERSION}"

      - name: Detect auth method
        id: auth
        env:
          HAS_OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
          HAS_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          METHOD="unknown"
          if [ "$HAS_OAUTH" = "true" ]; then
            mkdir -p ~/.claude
            echo '{"hasCompletedOnboarding":true}' > ~/.claude.json
            METHOD="oauth"
          elif [ "$HAS_API_KEY" = "true" ]; then
            METHOD="api_key"
          else
            echo "ERROR: No authentication configured." >&2
            jq --arg s "auth" --arg r "error" --arg e "No authentication" \
              '.steps += [{"step":$s,"result":$r,"error":$e}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            exit 1
          fi
          echo "method=$METHOD" >> "$GITHUB_OUTPUT"
          jq --arg s "auth" --arg r "success" --arg m "$METHOD" \
            '.steps += [{"step":$s,"result":$r,"method":$m}]' \
            "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"

      - name: Install pipeline/agent deps (npm ci)
        working-directory: pipeline/agent
        run: |
          npm ci
          # SDK v0.3.x ships its CLI as a platform-specific native binary
          # via optionalDependencies. The package-lock.json on the maintainer's
          # mac only writes a separate install entry for darwin-arm64, so
          # `npm ci` on linux-x64 skips the binary. Force-install it here.
          # Version mirrors the @anthropic-ai/claude-agent-sdk pin in
          # pipeline/agent/package.json.
          npm install --no-save @anthropic-ai/claude-agent-sdk-linux-x64@0.3.143

      - name: Install root verification deps (npm ci)
        run: npm ci

      # ---------------------------------------------------------------
      # 3. Update agent — only on version change
      # ---------------------------------------------------------------
      - name: Run update agent
        id: update
        if: steps.monitor.outputs.changes == 'true'
        continue-on-error: true
        working-directory: pipeline/agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          SKIP=$(jq -r '.pipelineOverrides.skipUpdateAgent // false' "../../skills/$SKILL_NAME/config.json" 2>/dev/null)
          if [[ "$SKIP" == "true" ]]; then
            echo "skipUpdateAgent=true for $SKILL_NAME — skipping (per pipelineOverrides)."
            jq --arg s "update" --arg r "skipped-by-config" \
              '.steps += [{"step":$s,"result":$r}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            exit 0
          fi
          START=$(date +%s)
          npx tsx update-agent.ts 2>&1 | tee /tmp/update-agent.log
          EXIT_CODE=${PIPESTATUS[0]}
          ELAPSED=$(( $(date +%s) - START ))
          if [ "$EXIT_CODE" -eq 0 ]; then
            jq --arg s "update" --arg r "success" --arg d "${ELAPSED}s" \
              '.steps += [{"step":$s,"result":$r,"duration":$d}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
          else
            LAST_LINES=$(tail -20 /tmp/update-agent.log | jq -Rs '.')
            jq --arg s "update" --arg r "failed" --arg d "${ELAPSED}s" \
              --arg c "$EXIT_CODE" --argjson e "$LAST_LINES" \
              '.steps += [{"step":$s,"result":$r,"duration":$d,"exitCode":($c|tonumber),"lastOutput":$e}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            exit $EXIT_CODE
          fi

      # ---------------------------------------------------------------
      # 4. Research agent — runs every day
      # ---------------------------------------------------------------
      - name: Run research agent
        id: research
        continue-on-error: true
        working-directory: pipeline/agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          SKIP=$(jq -r '.pipelineOverrides.skipResearchAgent // false' "../../skills/$SKILL_NAME/config.json" 2>/dev/null)
          if [[ "$SKIP" == "true" ]]; then
            echo "skipResearchAgent=true for $SKILL_NAME — skipping (per pipelineOverrides)."
            jq --arg s "research" --arg r "skipped-by-config" \
              '.steps += [{"step":$s,"result":$r}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            exit 0
          fi
          START=$(date +%s)
          npx tsx research-agent.ts 2>&1 | tee /tmp/research.log
          EXIT_CODE=${PIPESTATUS[0]}
          ELAPSED=$(( $(date +%s) - START ))
          if [ "$EXIT_CODE" -eq 0 ]; then
            jq --arg s "research" --arg r "success" --arg d "${ELAPSED}s" \
              '.steps += [{"step":$s,"result":$r,"duration":$d}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
          else
            LAST_LINES=$(tail -20 /tmp/research.log | jq -Rs '.')
            jq --arg s "research" --arg r "failed" --arg d "${ELAPSED}s" \
              --arg c "$EXIT_CODE" --argjson e "$LAST_LINES" \
              '.steps += [{"step":$s,"result":$r,"duration":$d,"exitCode":($c|tonumber),"lastOutput":$e}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            exit $EXIT_CODE
          fi

      # ---------------------------------------------------------------
      # 5. Verify+mend loop (only when version changed)
      # ---------------------------------------------------------------
      - name: Verify and mend loop
        id: verify
        if: steps.monitor.outputs.changes == 'true'
        continue-on-error: true
        working-directory: pipeline/agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          START=$(date +%s)
          MEND_ATTEMPTS=0
          for attempt in $(seq 0 $MAX_MEND_RETRIES); do
            echo ""
            echo "=== Verification attempt $((attempt + 1)) of $((MAX_MEND_RETRIES + 1)) ==="
            if bash verify.sh; then
              ELAPSED=$(( $(date +%s) - START ))
              jq --arg s "verify" --arg r "success" --arg d "${ELAPSED}s" \
                --arg a "$((attempt + 1))" --arg m "$MEND_ATTEMPTS" \
                '.steps += [{"step":$s,"result":$r,"duration":$d,"verifyAttempt":($a|tonumber),"mendRuns":($m|tonumber)}]' \
                "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
              exit 0
            fi
            if [ "$attempt" -eq "$MAX_MEND_RETRIES" ]; then
              ELAPSED=$(( $(date +%s) - START ))
              FAILURES=""
              if [ -f /tmp/verify-report.json ]; then
                FAILURES=$(jq -c '.failures' /tmp/verify-report.json)
              fi
              jq --arg s "verify" --arg r "failed" --arg d "${ELAPSED}s" \
                --arg a "$((attempt + 1))" --arg m "$MEND_ATTEMPTS" \
                --argjson f "${FAILURES:-[]}" \
                '.steps += [{"step":$s,"result":$r,"duration":$d,"verifyAttempt":($a|tonumber),"mendRuns":($m|tonumber),"failures":$f}]' \
                "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
              exit 1
            fi
            echo "--- Running mending agent (attempt $((attempt + 1))) ---"
            MEND_ATTEMPTS=$((MEND_ATTEMPTS + 1))
            npx tsx mending-agent.ts 2>&1 | tee /tmp/mending-agent-$((attempt + 1)).log
            MEND_EXIT=${PIPESTATUS[0]}
            if [ "$MEND_EXIT" -ne 0 ]; then
              echo "WARN: mending agent exited $MEND_EXIT on attempt $((attempt + 1))"
              jq --arg s "mending" --arg a "$((attempt + 1))" --arg c "$MEND_EXIT" \
                '.steps += [{"step":$s,"attempt":($a|tonumber),"result":"failed","exitCode":($c|tonumber)}]' \
                "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            fi
          done

      # ---------------------------------------------------------------
      # 6. Safety gates — all per-skill via SKILL_NAME env
      # ---------------------------------------------------------------
      - name: Typecheck templates
        id: typecheck_templates
        if: always()
        continue-on-error: true
        run: bash pipeline/scripts/typecheck-templates.sh

      - name: Validate schema-bound examples
        id: validate_examples
        if: always()
        continue-on-error: true
        run: bash pipeline/scripts/validate-examples.sh

      - name: Guard scaffoldComplete from agent tampering
        if: always()
        run: |
          # The research/mending agents have Write access and have been
          # observed flipping state.scaffoldComplete=true mid-run (likely
          # interpreting "task complete" as a cue). That causes
          # check_populated below to run in post-scaffold mode and fail on
          # residual stubs the agent didn't get to. scaffoldComplete must
          # only be promoted by the explicit Flip step below, never by an
          # agent. Reset to monitor.sh's snapshot of the committed value.
          STATE="skills/$SKILL_NAME/state.json"
          if [ ! -f /tmp/fresh-state.json ] || [ ! -f "$STATE" ]; then
            echo "Missing /tmp/fresh-state.json or $STATE — skipping guard."
            exit 0
          fi
          COMMITTED=$(jq -r '.scaffoldComplete // false' /tmp/fresh-state.json 2>/dev/null || echo "false")
          CURRENT=$(jq -r '.scaffoldComplete // false' "$STATE" 2>/dev/null || echo "false")
          # Normalise — anything that isn't literally "true" or "false" becomes "false"
          [ "$COMMITTED" = "true" ] || COMMITTED="false"
          [ "$CURRENT" = "true" ] || CURRENT="false"
          if [ "$CURRENT" != "$COMMITTED" ]; then
            echo "scaffoldComplete tamper detected: agent wrote '$CURRENT', committed was '$COMMITTED'. Resetting."
            jq --argjson sc "$COMMITTED" '.scaffoldComplete = $sc' "$STATE" \
              > /tmp/sc-reset.tmp && mv /tmp/sc-reset.tmp "$STATE"
          fi

      - name: Check populated sections
        id: check_populated
        if: always()
        continue-on-error: true
        run: bash pipeline/scripts/check-populated.sh

      - name: Check docs-snapshot drift vs upstream llms.txt
        id: check_docs_drift
        if: always()
        continue-on-error: true
        run: |
          # Skip when we just refreshed in this job — by definition the
          # MANIFEST is current. The drift gate exists to catch stale
          # snapshots between refreshes; checking immediately after one
          # creates a race with upstream that pushes ~minutely.
          if [ "${{ steps.refresh.outcome }}" = "success" ]; then
            echo "Refresh ran successfully in this job — MANIFEST is current. Skipping drift gate."
            exit 0
          fi
          bash pipeline/scripts/check-docs-drift.sh

      - name: Check sanitizer parity
        id: check_sanitizer_parity
        if: always()
        continue-on-error: true
        run: bash pipeline/scripts/check-sanitizer-parity.sh

      - name: Check gate-name parity
        id: check_gate_parity
        if: always()
        continue-on-error: true
        run: bash pipeline/scripts/check-gate-parity.sh

      - name: Run agent test suite (sanitiser assertions)
        id: agent_tests
        if: always()
        continue-on-error: true
        working-directory: pipeline/agent
        run: npm test

      # ---------------------------------------------------------------
      # 7. Update per-skill state.json — MERGE not overwrite
      # ---------------------------------------------------------------
      - name: Update skills/${{ matrix.skill }}/state.json (merge)
        if: always()
        run: |
          STATE="skills/$SKILL_NAME/state.json"
          if [ ! -f /tmp/fresh-state.json ]; then
            echo "No /tmp/fresh-state.json — keeping $STATE unchanged."
            exit 0
          fi
          if [ ! -f "$STATE" ]; then echo '{}' > "$STATE"; fi
          jq -s '
            .[0] as $live | .[1] as $fresh
            | ($live * {
                registry: $fresh.registry,
                github: $fresh.github,
                docs: $fresh.docs,
                trackedIssues: $fresh.trackedIssues,
                lastScannedIssueNumber: $fresh.lastScannedIssueNumber,
                lastAuditedVersion: $fresh.lastAuditedVersion,
                lastUpdated: $fresh.lastUpdated
              })
            | .researchedIssues = ($live.researchedIssues // {})
            | .lastRunWarnings  = ($live.lastRunWarnings // [])
            # scaffoldComplete is monitor-authoritative — agents must not
            # promote it. The dedicated Flip step below is the only
            # legitimate promoter. Source from $fresh (monitor.sh snapshot
            # of committed state), not $live (post-agent on-disk).
            | .scaffoldComplete = ($fresh.scaffoldComplete // false)
          ' "$STATE" /tmp/fresh-state.json > /tmp/merged-state.json \
            && mv /tmp/merged-state.json "$STATE"
          echo "merged $STATE — researchedIssues=$(jq '.researchedIssues | length' "$STATE"), lastRunWarnings=$(jq '.lastRunWarnings | length' "$STATE"), scaffoldComplete=$(jq -r '.scaffoldComplete' "$STATE")"

      - name: Flip scaffoldComplete on first successful population
        if: always() && steps.research.outcome == 'success'
        run: |
          STATE="skills/$SKILL_NAME/state.json"
          STUB_COUNT=$(grep -lE '\*Populated by the research agent\*' \
            skills/$SKILL_NAME/SKILL*.md skills/$SKILL_NAME/rules/*.md 2>/dev/null | wc -l | tr -d ' ')
          CURRENT=$(jq -r '.scaffoldComplete // false' "$STATE")
          echo "Residual stub files: $STUB_COUNT   scaffoldComplete: $CURRENT"
          if [ "$STUB_COUNT" = "0" ] && [ "$CURRENT" = "false" ]; then
            jq '.scaffoldComplete = true' "$STATE" > /tmp/sc.tmp && mv /tmp/sc.tmp "$STATE"
            echo "scaffoldComplete flipped to true"
          fi

      # ---------------------------------------------------------------
      # 7c. Diff-size gate before finalize-log so the report sees it
      # ---------------------------------------------------------------
      # Per-skill override: deterministic-render skills (e.g.,
      # anthropic-pulse) replace whole digest tables on every refresh
      # — the per-file diff is always >20% by design. They opt out via
      # pipelineOverrides.skipDiffSizeCheck. The gate's purpose is
      # catching unbounded LLM rewrites in agent-driven skills; for
      # mechanical-renderer skills it would always trip.
      - name: Check diff size against HEAD
        id: check_diff_size
        if: always()
        continue-on-error: true
        env:
          DIFF_THRESHOLD_PCT: ${{ env.DIFF_THRESHOLD_PCT }}
        run: |
          SKIP=$(jq -r '.pipelineOverrides.skipDiffSizeCheck // false' "skills/$SKILL_NAME/config.json" 2>/dev/null)
          if [[ "$SKIP" == "true" ]]; then
            echo "skipDiffSizeCheck=true for $SKILL_NAME — bypassing diff-size gate."
            exit 0
          fi
          bash pipeline/scripts/check-diff-size.sh

      - name: Finalize pipeline log
        if: always()
        run: |
          jq \
            --arg update_outcome "${{ steps.update.outcome || 'skipped' }}" \
            --arg research_outcome "${{ steps.research.outcome || 'skipped' }}" \
            --arg verify_outcome "${{ steps.verify.outcome || 'skipped' }}" \
            --arg typecheck_outcome "${{ steps.typecheck_templates.outcome || 'skipped' }}" \
            --arg validate_outcome "${{ steps.validate_examples.outcome || 'skipped' }}" \
            --arg populated_outcome "${{ steps.check_populated.outcome || 'skipped' }}" \
            --arg docsdrift_outcome "${{ steps.check_docs_drift.outcome || 'skipped' }}" \
            --arg sanitizer_parity_outcome "${{ steps.check_sanitizer_parity.outcome || 'skipped' }}" \
            --arg gate_parity_outcome "${{ steps.check_gate_parity.outcome || 'skipped' }}" \
            --arg agent_tests_outcome "${{ steps.agent_tests.outcome || 'skipped' }}" \
            --arg diffsize_outcome "${{ steps.check_diff_size.outcome || 'skipped' }}" \
            --arg finished "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '. + {
              "finishedAt": $finished,
              "outcomes": {
                "update": $update_outcome,
                "research": $research_outcome,
                "verify": $verify_outcome,
                "typecheckTemplates": $typecheck_outcome,
                "validateExamples": $validate_outcome,
                "checkPopulated": $populated_outcome,
                "checkDocsDrift": $docsdrift_outcome,
                "checkSanitizerParity": $sanitizer_parity_outcome,
                "checkGateParity": $gate_parity_outcome,
                "agentTests": $agent_tests_outcome,
                "checkDiffSize": $diffsize_outcome
              }
            }' "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
          cat "$PIPELINE_LOG" | jq .

      - name: Run report agent
        id: report
        if: always()
        continue-on-error: true
        working-directory: pipeline/agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          SKIP=$(jq -r '.pipelineOverrides.skipReportAgent // false' "../../skills/$SKILL_NAME/config.json" 2>/dev/null)
          if [[ "$SKIP" == "true" ]]; then
            echo "skipReportAgent=true for $SKILL_NAME — skipping (per pipelineOverrides)."
            jq --arg s "report" --arg r "skipped-by-config" \
              '.steps += [{"step":$s,"result":$r}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            exit 0
          fi
          START=$(date +%s)
          npx tsx report-agent.ts 2>&1 | tee /tmp/report-agent.log
          EXIT_CODE=${PIPESTATUS[0]}
          ELAPSED=$(( $(date +%s) - START ))
          if [ "$EXIT_CODE" -eq 0 ]; then
            jq --arg s "report" --arg r "success" --arg d "${ELAPSED}s" \
              '.steps += [{"step":$s,"result":$r,"duration":$d}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
          else
            LAST_LINES=$(tail -20 /tmp/report-agent.log | jq -Rs '.')
            jq --arg s "report" --arg r "failed" --arg d "${ELAPSED}s" \
              --arg c "$EXIT_CODE" --argjson e "$LAST_LINES" \
              '.steps += [{"step":$s,"result":$r,"duration":$d,"exitCode":($c|tonumber),"lastOutput":$e}]' \
              "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
            exit "$EXIT_CODE"
          fi

      - name: Update per-skill README auto-updated date
        if: always()
        run: |
          NOW=$(date -u +%Y-%m-%d)
          README="skills/$SKILL_NAME/README.md"
          if [ -f "$README" ]; then
            sed -i "s|^\*\*Last updated\*\*:.*|**Last updated**: $NOW|" "$README" || true
          fi

      # ---------------------------------------------------------------
      # 8. Commit + push per-skill (or draft PR on gate failure)
      # ---------------------------------------------------------------
      - name: Commit and push (${{ matrix.skill }}) or open draft PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Stage only this skill's changes + per-skill state — never
          # touch other skills' content from this matrix entry.
          git add -A "skills/$SKILL_NAME" || true
          if git diff --cached --quiet; then
            echo "No changes to commit for $SKILL_NAME."
            exit 0
          fi

          VALIDATE="${{ steps.validate_examples.outcome || 'skipped' }}"
          TYPECHECK="${{ steps.typecheck_templates.outcome || 'skipped' }}"
          POPULATED="${{ steps.check_populated.outcome || 'skipped' }}"
          DOCSDRIFT="${{ steps.check_docs_drift.outcome || 'skipped' }}"
          SANITIZER_PARITY="${{ steps.check_sanitizer_parity.outcome || 'skipped' }}"
          GATE_PARITY="${{ steps.check_gate_parity.outcome || 'skipped' }}"
          AGENT_TESTS="${{ steps.agent_tests.outcome || 'skipped' }}"
          DIFFSIZE="${{ steps.check_diff_size.outcome || 'skipped' }}"
          VERIFY="${{ steps.verify.outcome || 'skipped' }}"
          REPORT="${{ steps.report.outcome || 'skipped' }}"

          GATES_FAILED=""
          # check_docs_drift demoted to advisory (was failing on the race
          # between monitor at T0 and drift at T0+30min — upstream pushes
          # docs updates more often than the per-skill cron tick). The
          # agent regenerates MANIFEST.json on docs change per its prompt
          # (Part A step 9), so drift self-heals over time without
          # gating commits.
          for pair in \
              "validate_examples:$VALIDATE" "typecheck_templates:$TYPECHECK" \
              "check_populated:$POPULATED" \
              "check_sanitizer_parity:$SANITIZER_PARITY" "check_gate_parity:$GATE_PARITY" \
              "agent_tests:$AGENT_TESTS" "check_diff_size:$DIFFSIZE" \
              "verify:$VERIFY" "report:$REPORT"; do
            name="${pair%%:*}"
            outcome="${pair##*:}"
            if [ "$outcome" = "failure" ]; then
              GATES_FAILED="$GATES_FAILED $name"
            fi
          done
          # Drift is informational only — log if it tripped, but do not
          # route to draft.
          if [ "$DOCSDRIFT" = "failure" ]; then
            echo "INFO check_docs_drift tripped (advisory) — agent will regenerate MANIFEST next run."
          fi

          TODAY=$(date -u +%Y-%m-%d)
          REPORT_FILE="/tmp/change-report.json"

          {
            if [ -n "$GATES_FAILED" ]; then
              echo "auto[$SKILL_NAME]: pending review (${TODAY}) — gates failed:${GATES_FAILED}"
              echo ""
              echo "Skill: $SKILL_NAME"
              echo "Failed gates:${GATES_FAILED}"
            elif [ -f "$REPORT_FILE" ] && jq -e '.changes[] | select(.type == "npm_version")' "$REPORT_FILE" > /dev/null 2>&1; then
              OLD_VER=$(jq -r '.oldVersion' "$REPORT_FILE")
              NEW_VER=$(jq -r '.newVersion // "update"' "$REPORT_FILE")
              echo "auto[$SKILL_NAME]: v${OLD_VER} → v${NEW_VER} (${TODAY})"
            else
              echo "auto[$SKILL_NAME]: research + report (${TODAY})"
            fi
          } > /tmp/commit-message.txt

          if [ -n "$GATES_FAILED" ]; then
            BRANCH="auto/${SKILL_NAME}/${TODAY}-pending-review-${{ github.run_id }}-${{ github.run_attempt }}"
            echo "Routing to draft PR on branch: $BRANCH"
            git checkout -b "$BRANCH"
            git commit -F /tmp/commit-message.txt
            git push -u origin "$BRANCH"

            PR_BODY=$(printf '%s\n' \
              "Auto-generated by the daily pipeline for skill **$SKILL_NAME**." \
              "" \
              "**Failed gates:**${GATES_FAILED}" \
              "" \
              "Review the diff before merging. Common reasons gates fire:" \
              "" \
              "- **validate_examples**: a fenced JSON block no longer validates against its schema." \
              "- **typecheck_templates**: a template under skills/$SKILL_NAME/templates/ has invalid syntax." \
              "- **check_populated**: in post-scaffold mode, a stub marker still exists in a tracked file." \
              "- **check_docs_drift**: upstream llms.txt index hash changed since the last docs-snapshot/ refresh." \
              "- **check_sanitizer_parity**: the 3 bash defang implementations have drifted." \
              "- **check_gate_parity**: gate-name lists in workflow/TS/prompt no longer match the canonical set." \
              "- **agent_tests**: pipeline/agent npm test failed." \
              "- **check_diff_size**: a tracked file changed >${DIFF_THRESHOLD_PCT}% — possible runaway-LLM rewrite." \
              "- **verify**: version-string propagation or required-file presence failed." \
              "- **report**: the report-agent crashed.")

            gh pr create --draft \
              --title "auto[$SKILL_NAME]: pending review (${TODAY}) — $(echo "$GATES_FAILED" | xargs)" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH"
            PR_EXIT=$?
            if [ "$PR_EXIT" -ne 0 ]; then
              echo "ERROR: gh pr create failed with exit $PR_EXIT" >&2
              jq --arg s "pr-create" --arg r "failed" --arg c "$PR_EXIT" --arg b "$BRANCH" \
                '.steps += [{"step":$s,"result":$r,"exitCode":($c|tonumber),"branch":$b}]' \
                "$PIPELINE_LOG" > /tmp/pl.tmp && mv /tmp/pl.tmp "$PIPELINE_LOG"
              exit "$PR_EXIT"
            fi
          else
            git commit -F /tmp/commit-message.txt
            # Concurrent matrix entries (and the rare back-to-back cron tick
            # when a previous run overran) can both try to push to main. If
            # to main while we were working, `git push` fails with
            # "rejected (fetch first)". Try a rebase + retry once.
            if ! git push 2>/tmp/push-err; then
              if grep -q 'rejected\|fetch first\|non-fast-forward' /tmp/push-err; then
                echo "Push race detected — rebasing onto origin/main and retrying once..."
                git fetch origin main
                git rebase origin/main || {
                  echo "Rebase failed — likely a real conflict from concurrent edits to skills/$SKILL_NAME. Aborting; rerun next cron tick will retry."
                  git rebase --abort 2>/dev/null || true
                  cat /tmp/push-err
                  exit 1
                }
                git push
              else
                cat /tmp/push-err
                exit 1
              fi
            fi
          fi

      - name: Check for failures
        if: always()
        run: |
          UPDATE="${{ steps.update.outcome || 'skipped' }}"
          RESEARCH="${{ steps.research.outcome || 'skipped' }}"
          REPORT="${{ steps.report.outcome || 'skipped' }}"
          echo "Skill $SKILL_NAME outcomes: update=$UPDATE research=$RESEARCH report=$REPORT"
          if [ "$UPDATE" = "failure" ] || [ "$RESEARCH" = "failure" ] || [ "$REPORT" = "failure" ]; then
            echo "Skill $SKILL_NAME had agent crashes — failing this matrix entry."
            exit 1
          fi
